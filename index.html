<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Finder</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Our own CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">🍽️ Recipe Finder</span>
    </div>
  </nav>

  <div class="container">

    <!-- STEP 1: Type buttons -->
    <h4 class="mb-3">Choose a type</h4>
    <div id="typesContainer" class="mb-4 d-flex flex-wrap gap-2">
      <!-- Buttons are added here by JavaScript -->
    </div>

    <hr />

    <!-- Loader (hidden by default) -->
    <div id="loader" class="text-center my-4 d-none">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2">Loading recipes...</p>
    </div>

    <!-- STEP 2: Recipes grid -->
    <h4 class="mb-3">Recipes</h4>
    <div id="recipesContainer" class="row g-3">
      <!-- Recipe cards are added here by JavaScript -->
    </div>

  </div>

  <!-- STEP 3: Bootstrap Modal for recipe details -->
  <div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content recipe-modal-content">

        <button type="button" class="btn-close btn-close-white modal-close-btn" data-bs-dismiss="modal"></button>

        <div class="modal-body p-0">
          <!-- Loader inside modal -->
          <div id="modalLoader" class="text-center py-5 d-none">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>

          <!-- Modal content, filled by JavaScript -->
          <div id="modalBody"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Our own JS -->
  <script src="app.js"></script>
</body>
</html>
